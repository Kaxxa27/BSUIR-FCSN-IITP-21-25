version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: airport_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airport_db
    volumes:
      - airport_db_data:/var/lib/postgresql/data
    ports:
      - "7777:5432"

volumes:
  airport_db_data: